services:       
    edge-node:
      build: .
      container_name: edge-node
      ports:
        - "8080:8080"
      restart: unless-stopped
      healthcheck:                                                                                       
        test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
        interval: 30s                                                                                    
        timeout: 3s
        retries: 3