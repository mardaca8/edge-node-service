services:
    edge-node:
      build: .
      container_name: edge-node
      ports:
        - "8080:8080"
      restart: unless-stopped
    cloud-node:
      build: .
      container_name: cloud-node
      ports:
        - "8081:8080"                                                                    
      cap_add:
        - NET_ADMIN                           
      restart: unless-stopped                                                    
      entrypoint: >
        sh -c "                                                                                  
          apk add --no-cache iproute2 &&
          tc qdisc add dev eth0 root netem delay 100ms 10ms distribution normal &&                                       
          exec dotnet EdgeNode.dll                                                                                      
        " 